name: Model Image Rebuild

on:
  repository_dispatch:
    types: [model-image-rebuild]
  workflow_dispatch:
    inputs:
      buildTriggerId:
        description: Manager build trigger ID
        required: true
      migrationId:
        description: Model migration ID
        required: true
      migrationUrl:
        description: Civitai model download URL
        required: true
      migrationPath:
        description: Target path inside generator image
        required: true

permissions:
  contents: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve payload
        run: |
          BUILD_TRIGGER_ID="${{ github.event.client_payload.buildTriggerId || inputs.buildTriggerId }}"
          MIGRATION_ID="${{ github.event.client_payload.migration.id || inputs.migrationId }}"
          MIGRATION_URL="${{ github.event.client_payload.migration.url || inputs.migrationUrl }}"
          MIGRATION_PATH="${{ github.event.client_payload.migration.path || inputs.migrationPath }}"

          if [ -z "$BUILD_TRIGGER_ID" ] || [ -z "$MIGRATION_ID" ] || [ -z "$MIGRATION_URL" ] || [ -z "$MIGRATION_PATH" ]; then
            echo "Missing required model migration payload."
            exit 1
          fi

          {
            echo "BUILD_TRIGGER_ID=$BUILD_TRIGGER_ID"
            echo "MIGRATION_ID=$MIGRATION_ID"
            echo "MIGRATION_URL=$MIGRATION_URL"
            echo "MIGRATION_PATH=$MIGRATION_PATH"
            echo "IMAGE_TAG=model-$BUILD_TRIGGER_ID"
          } >> "$GITHUB_ENV"

      - name: Commit model migration
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          PUSHED_COMMIT=""
          for attempt in 1 2 3; do
            echo "Preparing migration commit attempt $attempt..."
            git fetch origin "$GITHUB_REF_NAME"
            git reset --hard "origin/$GITHUB_REF_NAME"

            python generator/scripts/add_model_migration.py \
              --id "$MIGRATION_ID" \
              --url "$MIGRATION_URL" \
              --path "$MIGRATION_PATH"
            python generator/scripts/render_model_dockerfile.py

            git add generator/model-migrations generator/Dockerfile
            if git diff --cached --quiet; then
              echo "No migration changes to commit."
              exit 0
            fi

            git commit -m "Add model migration $MIGRATION_ID"
            if git push; then
              PUSHED_COMMIT="$(git rev-parse HEAD)"
              echo "PUSHED_COMMIT=$PUSHED_COMMIT" >> "$GITHUB_ENV"
              exit 0
            fi

            echo "Migration push failed, retrying with latest remote state..."
            sleep $((attempt * 5))
          done

          echo "Failed to push migration after retries."
          exit 1

      - name: Create RunPod GitHub build release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin "$GITHUB_REF_NAME"
          git reset --hard "origin/$GITHUB_REF_NAME"

          RELEASE_TAG="${{ env.IMAGE_TAG }}"
          RELEASE_TITLE="Model image build $BUILD_TRIGGER_ID"
          RELEASE_NOTES="RunPod GitHub integration should build generator/Dockerfile from this release. Migration: $MIGRATION_ID"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists."
          else
            gh release create "$RELEASE_TAG" \
              --target "$(git rev-parse HEAD)" \
              --title "$RELEASE_TITLE" \
              --notes "$RELEASE_NOTES"
          fi

      - name: Optional custom RunPod build hook
        env:
          RUNPOD_BUILD_WEBHOOK_URL: ${{ secrets.RUNPOD_BUILD_WEBHOOK_URL }}
          RUNPOD_BUILD_WEBHOOK_TOKEN: ${{ secrets.RUNPOD_BUILD_WEBHOOK_TOKEN }}
        run: |
          if [ -z "$RUNPOD_BUILD_WEBHOOK_URL" ]; then
            echo "RUNPOD_BUILD_WEBHOOK_URL is not configured; relying on RunPod GitHub release integration."
            exit 0
          fi
          curl -fsS -X POST "$RUNPOD_BUILD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $RUNPOD_BUILD_WEBHOOK_TOKEN" \
            -d "{\"releaseTag\":\"${{ env.IMAGE_TAG }}\",\"buildTriggerId\":\"$BUILD_TRIGGER_ID\",\"migrationId\":\"$MIGRATION_ID\"}"

      - name: Report RunPod build trigger to manager
        if: always()
        env:
          MANAGER_WEBHOOK_URL: ${{ secrets.MANAGER_WEBHOOK_URL }}
          MANAGER_WEBHOOK_TOKEN: ${{ secrets.MANAGER_WEBHOOK_TOKEN }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="BUILDING"
            MESSAGE="RunPod GitHub build release ${{ env.IMAGE_TAG }} was created. Track final build status in RunPod Builds."
          else
            STATUS="FAILED"
            MESSAGE="Failed to create RunPod GitHub build release."
          fi

          if [ -n "$MANAGER_WEBHOOK_URL" ]; then
            curl -fsS -X POST "$MANAGER_WEBHOOK_URL/api/v1/webhooks/model-image" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $MANAGER_WEBHOOK_TOKEN" \
              -d "{\"buildTriggerId\":\"$BUILD_TRIGGER_ID\",\"status\":\"$STATUS\",\"image\":\"${{ env.IMAGE_TAG }}\",\"message\":\"$MESSAGE\"}"
          fi
